<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의교정 주간식단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        .tab-transition { transition: all 0.2s ease-in-out; }
        .menu-main-style { 
            white-space: nowrap !important; 
            letter-spacing: -0.03em !important;
            word-break: keep-all;
            font-size: 1.5rem; 
            line-height: 2rem;
        }
        .day-sun { color: #EF4444; }
        .day-sat { color: #3B82F6; }
        @media (min-width: 640px) {
            .menu-main-style { font-size: 1.875rem; line-height: 2.25rem; }
        }
    </style>
</head>
<body class="bg-white text-slate-800">
    <div id="app" class="max-w-2xl mx-auto flex flex-col items-center p-4 pt-6">
        
        <div class="w-full bg-[#EEF2F6] rounded-3xl p-5 flex flex-col items-center mb-4 border border-slate-100 shadow-sm">
            <div class="flex items-center gap-2 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H20a2 2 0 0 1 2 2v5.5"/><path d="M16 21.3h6"/><path d="M16 17h6"/><path d="M21 15V9"/><path d="M18 11h2"/><path d="m22 21-3-3"/><path d="m19 21 3-3"/></svg>
                <h1 class="text-xl md:text-2xl font-black text-[#2C3E50] tracking-tight">성의교정 주간식단</h1>
            </div>
            <div class="flex justify-center items-center gap-3">
                <span id="display-date-container" class="font-bold text-slate-700 text-xl md:text-2xl tracking-tight">
                    <span id="display-date-text">로딩 중...</span>
                    <span id="display-day-text" class="ml-1"></span>
                </span>
                <span id="shift-badge" class="text-white text-sm md:text-base px-3 py-0.5 rounded-full font-black shadow-sm transition-colors duration-300">--</span>
            </div>
        </div>

        <div id="timer-container" class="flex items-center gap-1.5 text-slate-500 text-sm mb-4 font-medium italic min-h-[20px]">
            <span id="timer-icon">⏳</span>
            <span id="timer-text">데이터를 불러오는 중입니다...</span>
        </div>

        <div class="grid grid-cols-3 gap-3 w-full mb-5 px-1">
            <button onclick="changeDate(-1)" class="border border-slate-200 rounded-md py-2.5 text-xs font-bold text-[#3498DB] hover:bg-slate-50 transition-colors uppercase tracking-widest">PREV</button>
            <button onclick="goToday()" class="border border-slate-200 rounded-md py-2.5 text-xs font-bold text-[#3498DB] hover:bg-slate-50 transition-colors uppercase tracking-widest">TODAY</button>
            <button onclick="changeDate(1)" class="border border-slate-200 rounded-md py-2.5 text-xs font-bold text-[#3498DB] hover:bg-slate-50 transition-colors uppercase tracking-widest">NEXT</button>
        </div>

        <div id="tabs-container" class="grid grid-cols-5 w-full"></div>

        <div id="menu-card" class="w-full border-[3.5px] rounded-b-[2rem] rounded-tr-none min-h-[240px] flex flex-col transition-all duration-300 shadow-sm overflow-hidden">
            <div class="flex-grow flex flex-col justify-center items-center text-center p-5 md:p-8 pb-4">
                <h2 id="main-menu" class="font-black mb-3 text-slate-800 menu-main-style"></h2>
                <div class="w-14 h-[1.5px] bg-slate-200 mb-4"></div>
                <p id="sub-menu" class="text-slate-600 leading-relaxed max-w-full font-semibold text-base md:text-lg px-2"></p>
            </div>
            <div class="px-6 py-3.5 bg-slate-50 border-t border-slate-100 flex items-center justify-center gap-2 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                <p id="comment-text" class="text-sm font-medium text-slate-500 leading-snug"></p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby-Z8SuA5iNLjmXAKZewhrj374ObuCcBBt3z3uPyJ2lHsr7dobCZ_6JvZE-mXMImxDs/exec";

        // 근무조 설정
        const shiftConfig = {
            baseDate: new Date('2026-03-13'),
            pattern: [
                { name: 'A', color: '#EF4444' },
                { name: 'B', color: '#F59E0B' },
                { name: 'C', color: '#3B82F6' }
            ]
        };

        // 식단 기본 정보 (시간/색상)
        const mealMeta = {
            '조식': { color: '#E65D4F', inactiveBg: '#F9DEDC', startTime: '07:00', endTime: '09:00' },
            '간편식': { color: '#F2A134', inactiveBg: '#FDF2E2', startTime: '08:00', endTime: '09:30' },
            '중식': { color: '#6AB04C', inactiveBg: '#EDF6E9', startTime: '11:20', endTime: '16:00' },
            '석식': { color: '#3498DB', inactiveBg: '#EBF3FA', startTime: '17:20', endTime: '19:20' },
            '야식': { color: '#8E44AD', inactiveBg: '#F0ECF7', startTime: '18:00', endTime: '20:00' }
        };

        const MEAL_ORDER = ["조식", "간편식", "중식", "석식", "야식"];
        let allData = {}; // GAS에서 받아온 데이터
        let currentDate = new Date();
        let activeTab = "중식";

        // 정규화 함수
        function normalize(str) { return String(str).replace(/[^ㄱ-ㅎ가-힣a-zA-Z0-9]/g, ""); }

        // 날짜 데이터 찾기 로직
        function findDateData(date) {
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const candidates = [
                `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
                `${y}-${m}-${d}`,
                `${y}${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`
            ];
            for (const key of candidates) { if (allData[key]) return allData[key]; }
            return null;
        }

        function getShiftForDate(date) {
            const targetDate = new Date(date); targetDate.setHours(0, 0, 0, 0);
            const baseDate = new Date(shiftConfig.baseDate); baseDate.setHours(0, 0, 0, 0);
            const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
            const index = ((diffDays % 3) + 3) % 3;
            return shiftConfig.pattern[index];
        }

        function autoMeal() {
            const h = new Date().getHours();
            if (h < 9) return "조식";
            if (h < 14) return "중식";
            return "석식";
        }

        async function init() {
            activeTab = autoMeal();
            const cache = localStorage.getItem("meal_cache");
            if (cache) { allData = JSON.parse(cache); updateUI(); }

            try {
                const res = await fetch(GAS_URL);
                allData = await res.json();
                localStorage.setItem("meal_cache", JSON.stringify(allData));
                updateUI();
            } catch (e) { console.error("데이터 로드 실패", e); }
        }

        function getStatusMessage() {
            const now = new Date();
            const isToday = currentDate.toDateString() === now.toDateString();
            if (!isToday) return { msg: `${currentDate.toLocaleDateString()} 식단 정보입니다.`, icon: "📅" };

            const meta = mealMeta[activeTab];
            const [sH, sM] = meta.startTime.split(':').map(Number);
            const [eH, eM] = meta.endTime.split(':').map(Number);
            const start = new Date(); start.setHours(sH, sM, 0);
            const end = new Date(); end.setHours(eH, eM, 0);

            if (now < start) return { msg: `${activeTab} 준비 중입니다.`, icon: "⏳" };
            if (now <= end) return { msg: `현재 ${activeTab} 배식 중입니다! ✨`, icon: "🍽️" };
            return { msg: `${activeTab} 배식이 종료되었습니다.`, icon: "✅" };
        }

        function updateUI() {
            const dateText = document.getElementById('display-date-text');
            const dayText = document.getElementById('display-day-text');
            const shiftBadge = document.getElementById('shift-badge');
            const tabsContainer = document.getElementById('tabs-container');
            const mainMenu = document.getElementById('main-menu');
            const subMenu = document.getElementById('sub-menu');
            const commentText = document.getElementById('comment-text');
            const menuCard = document.getElementById('menu-card');

            // 1. 날짜 및 근무조 표시
            const weekIdx = currentDate.getDay();
            const weekNames = ['일', '월', '화', '수', '목', '금', '토'];
            dateText.innerText = `${currentDate.getFullYear()}.${String(currentDate.getMonth()+1).padStart(2,'0')}.${String(currentDate.getDate()).padStart(2,'0')}`;
            dayText.innerText = ` (${weekNames[weekIdx]})`;
            dayText.className = "ml-1 " + (weekIdx === 0 ? 'day-sun' : (weekIdx === 6 ? 'day-sat' : ''));
            
            const shift = getShiftForDate(currentDate);
            shiftBadge.innerText = `${shift.name}조`;
            shiftBadge.style.backgroundColor = shift.color;

            // 2. 탭 생성
            tabsContainer.innerHTML = '';
            MEAL_ORDER.forEach(meal => {
                const isActive = meal === activeTab;
                const meta = mealMeta[meal];
                const btn = document.createElement('button');
                btn.innerText = meal;
                btn.className = `py-3.5 text-sm font-bold rounded-t-2xl tab-transition`;
                btn.style.backgroundColor = isActive ? meta.color : meta.inactiveBg;
                btn.style.color = isActive ? 'white' : '#475569';
                btn.style.opacity = isActive ? '1' : '0.75';
                btn.onclick = () => { activeTab = meal; updateUI(); };
                tabsContainer.appendChild(btn);
            });

            // 3. 식단 데이터 매칭
            const dayData = findDateData(currentDate);
            let info = null;
            if (dayData) {
                for (const key in dayData) {
                    if (normalize(key) === normalize(activeTab)) { info = dayData[key]; break; }
                }
            }

            const activeColor = mealMeta[activeTab].color;
            menuCard.style.borderColor = activeColor;
            mainMenu.innerText = info?.menu || "식단 정보가 없습니다.";
            subMenu.innerText = info?.side || "-";
            commentText.innerText = info?.comment || "오늘도 즐거운 하루 되세요! 😊";

            const status = getStatusMessage();
            document.getElementById('timer-text').innerText = status.msg;
            document.getElementById('timer-icon').innerText = status.icon;
        }

        function changeDate(n) { currentDate.setDate(currentDate.getDate() + n); updateUI(); }
        function goToday() { currentDate = new Date(); activeTab = autoMeal(); updateUI(); }

        window.onload = init;
        setInterval(updateUI, 60000);
    </script>
</body>
</html>
